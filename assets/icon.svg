<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="roundedSquare">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1200;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#7A5C10;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9A535;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0E6C0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#E8C84A;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#C9A535;stop-opacity:0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <rect width="1024" height="1024" fill="url(#bgGradient)"/>
    <rect width="1024" height="1024" fill="url(#glowGradient)"/>

    <g opacity="0.07" stroke="#FFD700" stroke-width="1">
      <line x1="0" y1="128" x2="1024" y2="128"/><line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="384" x2="1024" y2="384"/><line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="640" x2="1024" y2="640"/><line x1="0" y1="768" x2="1024" y2="768"/>
      <line x1="0" y1="896" x2="1024" y2="896"/>
      <line x1="128" y1="0" x2="128" y2="1024"/><line x1="256" y1="0" x2="256" y2="1024"/>
      <line x1="384" y1="0" x2="384" y2="1024"/><line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="640" y1="0" x2="640" y2="1024"/><line x1="768" y1="0" x2="768" y2="1024"/>
      <line x1="896" y1="0" x2="896" y2="1024"/>
    </g>

    <circle cx="512" cy="490" r="310" fill="url(#coinGradient)" filter="url(#softShadow)"/>
    <circle cx="512" cy="490" r="275" fill="none" stroke="#C9A535" stroke-width="12" opacity="0.6"/>
    <circle cx="512" cy="490" r="248" fill="none" stroke="#C9A535" stroke-width="5" opacity="0.3"/>
    <circle cx="512" cy="490" r="275" fill="#FDF8EC" opacity="0.5"/>

    <rect x="388" y="438" width="248" height="26" rx="13" fill="#C9A535"/>
    <rect x="388" y="490" width="248" height="26" rx="13" fill="#C9A535"/>
    <rect x="496" y="490" width="32" height="130" rx="16" fill="#C9A535"/>
    <line x1="390" y1="330" x2="512" y2="464" stroke="#C9A535" stroke-width="32" stroke-linecap="round"/>
    <line x1="634" y1="330" x2="512" y2="464" stroke="#C9A535" stroke-width="32" stroke-linecap="round"/>

    <ellipse cx="420" cy="370" rx="90" ry="55" fill="white" opacity="0.22" transform="rotate(-30 420 370)"/>

    <circle cx="512" cy="172" r="10" fill="#C9A535" opacity="0.5"/>
    <circle cx="512" cy="808" r="10" fill="#C9A535" opacity="0.5"/>
    <circle cx="194" cy="490" r="10" fill="#C9A535" opacity="0.5"/>
    <circle cx="830" cy="490" r="10" fill="#C9A535" opacity="0.5"/>

    <rect x="160" y="830" width="704" height="104" rx="52" fill="#C9A535" opacity="0.18"/>
    <rect x="162" y="832" width="700" height="100" rx="50" fill="none" stroke="#C9A535" stroke-width="2" opacity="0.4"/>
    <text x="512" y="899" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif"
          font-size="52" font-weight="700" fill="#FFFFFF" text-anchor="middle"
          letter-spacing="8" opacity="0.92">錢錢管家</text>

    <rect width="1024" height="1024" fill="url(#shineGradient)"/>
  </g>
</svg>
