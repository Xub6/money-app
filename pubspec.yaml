name: money_app
description: "錢錢管家 - 個人記帳 App"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  intl: ^0.19.0

  # Phase 1 & 2: Core dependencies
  uuid: ^4.0.0                      # Secure ID generation
  sqflite: ^2.3.0                   # SQLite database
  path_provider: ^2.1.0             # File paths
  csv: ^6.0.0                       # CSV export
  excel: ^3.0.0                     # Excel export

  # Phase 2: Security & Storage
  flutter_secure_storage: ^9.0.0    # Encrypted storage
  encrypt: ^5.0.3                   # AES encryption (null-safe)
  provider: ^6.0.0                  # State management upgrade
  path: ^1.9.0                      # Path utilities
  http: ^1.2.0                      # HTTP requests (Yahoo Finance + feedback)
  image_picker: ^1.1.2              # 相簿選取圖片（feedback 附圖）
  device_info_plus: ^11.1.1         # 裝置型號 / OS 版本（feedback 裝置資訊）
  package_info_plus: ^8.1.2         # App version（feedback 裝置資訊）
  crypto: ^3.0.0                    # SHA256 hashing
  tutorial_coach_mark: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon.jpg
